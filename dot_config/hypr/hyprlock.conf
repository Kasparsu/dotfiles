general {
    hide_cursor = true
    grace = 2
}

background {
    monitor =
    color = rgba(15, 15, 20, 1.0)
    blur_passes = 0
}

input-field {
    monitor =
    size = 280, 50
    position = 0, -120
    halign = center
    valign = center

    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    rounding = 8

    outer_color = rgba(220, 20, 60, 0.9)
    inner_color = rgba(20, 20, 28, 0.85)
    font_color  = rgba(230, 230, 230, 1.0)
    check_color = rgba(220, 20, 60, 1.0)
    fail_color  = rgba(220, 20, 60, 1.0)

    placeholder_text = <i>Password…</i>
    fail_text = <b>$FAIL</b>
    hide_input = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 96
    font_family = sans-serif
    color = rgba(230, 230, 230, 1.0)
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    font_size = 22
    font_family = sans-serif
    color = rgba(200, 200, 200, 0.9)
    position = 0, 40
    halign = center
    valign = center
}
